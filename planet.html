<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planets</title>
</head>

<body>

    <h1> My Planet cards</h1>
    <p>Use Javascript class to build planet cards</p>
    <button onclick="showplanets()">Show PLanets!</button>
    <div class="cards">
        <div id="card1"></div>
        <div id="card2"></div>
        <div id="card3"></div>
    </div>
    <script>
        class Planet {
            constructor(name, fact) {
                this.name=name;
                this.fact=fact;
            }
            describe() {
                return this.name + ": " + this.fact
            }
        }

        function showPlanets() {
            let p1 = new Planet("Earth", "The only planet with life");
            let p2 = new planet("Mars", "Known as the Red Planet");
            let p3 = new planet("Saturn", "Famous for its rings");
            document.getElementById("card1").innerHTML = 
            "<div class="card"><div class="planet.name">" + p1.name + "</div>" +
            "<div class="planet.fact">" + p1.describe + "</div></div>";
